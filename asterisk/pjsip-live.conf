;
; Asterisk PJSIP config snippet for voice-agent-live-v2
; Separate test account so v1 and v2 can be compared side-by-side.
;

[testlive]
type=endpoint
transport=transport-udp
context=from-softphone-live
disallow=all
allow=ulaw
allow=alaw
auth=testlive
aors=testlive
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[testlive]
type=auth
auth_type=userpass
username=testlive
password=testlive123

[testlive]
type=aor
max_contacts=5
remove_existing=yes
qualify_frequency=30
