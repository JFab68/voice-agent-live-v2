;
; Asterisk dialplan snippet for voice-agent-live-v2
; Route calls from the testlive SIP account into AudioSocket.
;

[from-softphone-live]
exten => _X.,1,NoOp(Live v2 softphone call: ${CALLERID(all)})
 same => n,Answer()
 same => n,Set(UUID=${UNIQUEID})
 same => n,NoOp(AudioSocket UUID: ${UUID})
 same => n,AudioSocket(${UUID},127.0.0.1:9019)
 same => n,Hangup()
